<!DOCTYPE html>
<html>
<head>
    <title>Fleet Monitor</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0d0d0d; color: #e0e0e0; font-family: Arial, sans-serif; }

        /* ── Top bar ── */
        #topbar {
            display: flex; align-items: center; gap: 14px;
            background: #161616; border-bottom: 1px solid #222;
            padding: 10px 18px;
        }
        #topbar h1 { font-size: 16px; color: #00d4ff; flex: 1; }
        #deviceTabs { display: flex; gap: 8px; flex-wrap: wrap; }
        .tab-btn {
            background: #222; color: #aaa; border: 1px solid #333;
            padding: 5px 14px; border-radius: 20px; cursor: pointer;
            font-size: 13px; transition: all .2s;
        }
        .tab-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: bold; }
        .tab-btn .dot {
            display: inline-block; width: 8px; height: 8px;
            background: #2ecc71; border-radius: 50%; margin-right: 5px;
        }
        #noDevices {
            padding: 80px; text-align: center; color: #555; font-size: 15px;
        }
        #noDevices span { display: block; font-size: 48px; margin-bottom: 14px; }

        /* ── Device panel ── */
        .device-panel { display: none; padding: 16px 18px; }
        .device-panel.active { display: block; }

        /* ── Channel grid ── */
        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }
        .channel-card {
            background: #161616; border: 1px solid #222; border-radius: 8px;
            overflow: hidden;
        }
        .channel-card h3 {
            padding: 8px 12px; font-size: 13px; color: #00d4ff;
            background: #111; border-bottom: 1px solid #222;
            display: flex; align-items: center; gap: 8px;
        }
        .live-badge {
            background: #c0392b; color: #fff; padding: 1px 7px;
            border-radius: 4px; font-size: 10px; letter-spacing: 1px;
        }
        video { width: 100%; display: block; background: #000; aspect-ratio: 16/9; }

        /* ── Map + GPS row ── */
        .map-row { display: grid; grid-template-columns: 1fr 320px; gap: 14px; margin-bottom: 14px; }
        .device-map { height: 320px; border-radius: 8px; border: 1px solid #222; }

        .gps-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
        .info-box {
            background: #1a1a1a; padding: 9px 12px; border-radius: 6px;
            font-size: 12px; border-left: 3px solid #00d4ff; color: #ccc;
        }
        .info-box strong { display: block; color: #888; font-size: 10px; margin-bottom: 2px; }

        /* ── Recordings ── */
        .section-title { color: #00d4ff; font-size: 14px; margin: 18px 0 10px; }
        .rec-controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        .rec-controls input[type=datetime-local] {
            background: #222; color: #fff; border: 1px solid #444;
            padding: 6px 10px; border-radius: 4px; font-size: 13px;
        }
        .btn { border: none; padding: 7px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-blue  { background: #00d4ff; color: #000; }
        .btn-green { background: #27ae60; color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead tr { background: #1a1a1a; }
        th { padding: 8px 10px; color: #00d4ff; text-align: left; border-bottom: 1px solid #222; }
        td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; }
        .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 3px; border: none;
                  cursor: pointer; background: #00d4ff; color: #000; font-weight: bold; }
        .playback-section { margin-top: 18px; display: none; }
        .playback-section video { max-width: 900px; background: #000; border-radius: 6px; }
    </style>
</head>
<body>

<div id="topbar">
    <h1>🚛 Fleet Monitor</h1>
    <div id="deviceTabs"></div>
</div>

<div id="noDevices">
    <span>📡</span>
    Waiting for devices to connect…
</div>

<div id="devicePanels"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ══════════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════════
const devices   = {};   // { [phone]: { map, marker, polyline, trail, hlsInstances, channels, recs } }
let activePhone = null;

// ══════════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════════
const ws = new WebSocket(`ws://${location.hostname}:8801`);
ws.onopen  = () => console.log('[WS] connected');
ws.onclose = () => console.warn('[WS] disconnected');
ws.onerror = e  => console.error('[WS] error:', e);

ws.onmessage = e => {
    let msg;
    try { msg = JSON.parse(e.data); } catch(err) { return; }

    if (msg.type === 'device_list')     handleDeviceList(msg.devices);
    if (msg.type === 'location')        handleLocation(msg);
    if (msg.type === 'recordings')      handleRecordings(msg.data);
    if (msg.type === 'recording_ready') handleRecordingReady(msg.url);
    if (msg.type === 'status')          setRecStatus(msg.message);
    if (msg.type === 'error')           setRecStatus('❌ ' + msg.message);
};

// ══════════════════════════════════════════════════════
//  Device list
// ══════════════════════════════════════════════════════
function handleDeviceList(list) {
    const phones = list.map(d => String(d.phone));

    // Remove disconnected devices
    for (const ph of Object.keys(devices)) {
        if (!phones.includes(ph)) removeDevice(ph);
    }

    // Add / update
    list.forEach(d => {
        const ph = String(d.phone);
        if (!devices[ph]) addDevice(ph, d.channels);
        else d.channels.forEach(ch => addChannelVideo(ph, ch));
    });

    document.getElementById('noDevices').style.display = phones.length ? 'none' : 'block';
    if (phones.length && !devices[activePhone]) setActiveDevice(phones[0]);
}

function addDevice(phone, channels) {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'tab-btn';
    tab.id        = `tab-${phone}`;
    tab.innerHTML = `<span class="dot"></span>${phone}`;
    tab.onclick   = () => setActiveDevice(phone);
    document.getElementById('deviceTabs').appendChild(tab);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'device-panel';
    panel.id        = `panel-${phone}`;
    panel.innerHTML = `
        <div class="channel-grid" id="channels-${phone}"></div>
        <div class="map-row">
            <div id="map-${phone}" class="device-map"></div>
            <div class="gps-grid">
                ${[
                    ['lat','Latitude'],['lon','Longitude'],['speed','Speed'],['dir','Direction'],
                    ['elev','Elevation'],['dt','DateTime'],['acc','ACC'],['located','Located'],
                    ['mileage','Mileage'],['voltage','Voltage'],['sats','Satellites'],['alarms','Alarms']
                ].map(([k,l]) => `
                    <div class="info-box"><strong>${l}</strong><span id="${phone}-${k}">--</span></div>
                `).join('')}
            </div>
        </div>
        <h3 class="section-title">📹 Recordings</h3>
        <div class="rec-controls">
            <label style="color:#aaa;font-size:13px;">From:</label>
            <input type="datetime-local" id="${phone}-recFrom">
            <label style="color:#aaa;font-size:13px;">To:</label>
            <input type="datetime-local" id="${phone}-recTo">
            <button class="btn btn-blue" onclick="searchRecordings('${phone}')">🔍 Search</button>
            <button class="btn btn-green" onclick="downloadSelected('${phone}')">⬇ Download Selected</button>
            <span id="${phone}-recStatus" style="color:#888;font-size:12px;"></span>
        </div>
        <table>
            <thead><tr>
                <th><input type="checkbox" onchange="toggleAll('${phone}',this)"></th>
                <th>CH</th><th>Start</th><th>End</th><th>Size</th><th>Action</th>
            </tr></thead>
            <tbody id="${phone}-recList">
                <tr><td colspan="6" style="color:#555;padding:10px;">Select date range and click Search</td></tr>
            </tbody>
        </table>
        <div class="playback-section" id="${phone}-playbackSection">
            <h3 class="section-title">▶ Playback</h3>
            <video id="${phone}-playback" controls></video>
        </div>
    `;
    document.getElementById('devicePanels').appendChild(panel);

    // Leaflet map
    const map = L.map(`map-${phone}`).setView([20, 0], 2);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    devices[phone] = { phone, channels: [], map, marker: null, polyline: null, trail: [], hlsInstances: {}, recs: [] };
    channels.forEach(ch => addChannelVideo(phone, ch));

    if (!activePhone) setActiveDevice(phone);
}

function removeDevice(phone) {
    const dev = devices[phone];
    if (dev) {
        Object.values(dev.hlsInstances).forEach(h => { try { h.destroy(); } catch(_){} });
        try { dev.map.remove(); } catch(_){}
    }
    delete devices[phone];
    document.getElementById(`tab-${phone}`)?.remove();
    document.getElementById(`panel-${phone}`)?.remove();
    if (activePhone === phone) {
        const remaining = Object.keys(devices);
        setActiveDevice(remaining[0] || null);
    }
}

function addChannelVideo(phone, ch) {
    const dev = devices[phone];
    if (!dev || dev.channels.includes(ch)) return;
    dev.channels.push(ch);

    const card = document.createElement('div');
    card.className = 'channel-card';
    card.id        = `chcard-${phone}-${ch}`;
    card.innerHTML = `
        <h3>
            Channel ${ch}
            <small style="color:#666;font-size:11px;">${phone}</small>
            <span class="live-badge">LIVE</span>
        </h3>
        <video id="video-${phone}-${ch}" autoplay muted controls playsinline></video>
    `;
    document.getElementById(`channels-${phone}`).appendChild(card);

    const src   = `/public/${phone}_ch${ch}.m3u8`;
    const video = document.getElementById(`video-${phone}-${ch}`);
    const hls   = new Hls({ lowLatencyMode: true });
    hls.loadSource(src);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    hls.on(Hls.Events.ERROR, (ev, d) => console.error(`HLS ${phone} ch${ch}:`, d));
    dev.hlsInstances[ch] = hls;
}

// ══════════════════════════════════════════════════════
//  Tabs
// ══════════════════════════════════════════════════════
function setActiveDevice(phone) {
    document.querySelectorAll('.device-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
    activePhone = phone;
    if (!phone) return;
    document.getElementById(`panel-${phone}`)?.classList.add('active');
    document.getElementById(`tab-${phone}`)?.classList.add('active');
    setTimeout(() => devices[phone]?.map?.invalidateSize(), 100);
}

// ══════════════════════════════════════════════════════
//  GPS
// ══════════════════════════════════════════════════════
const truckIcon = L.divIcon({
    html: `<div style="background:#00d4ff;width:18px;height:18px;border-radius:50%;
                        border:3px solid #fff;box-shadow:0 0 8px #00d4ff;"></div>`,
    iconSize: [18,18], iconAnchor: [9,9], className: '',
});

function handleLocation(msg) {
    const phone = String(msg.phone);
    const dev   = devices[phone];
    if (!dev) return;

    const pos = [msg.lat, msg.lon];
    if (!dev.marker) {
        dev.marker = L.marker(pos, { icon: truckIcon }).addTo(dev.map);
        dev.map.setView(pos, 15);
    } else {
        dev.marker.setLatLng(pos);
    }
    dev.marker.bindPopup(`<b>${phone}</b><br>
        ${msg.lat.toFixed(6)}, ${msg.lon.toFixed(6)}<br>
        Speed: ${msg.speed} km/h | Dir: ${msg.direction}°`);

    dev.trail.push(pos);
    if (dev.trail.length > 50) dev.trail.shift();
    if (dev.polyline) dev.map.removeLayer(dev.polyline);
    dev.polyline = L.polyline(dev.trail, { color: '#00d4ff', weight: 2 }).addTo(dev.map);
    dev.map.panTo(pos);

    const s = (k, v) => { const el = document.getElementById(`${phone}-${k}`); if (el) el.textContent = v; };
    s('lat',    msg.lat.toFixed(6));
    s('lon',    msg.lon.toFixed(6));
    s('speed',  msg.speed + ' km/h');
    s('dir',    msg.direction + '°');
    s('elev',   msg.elevation + ' m');
    s('dt',     msg.datetime);
    s('acc',    msg.accOn    ? 'ON'  : 'OFF');
    s('located',msg.located  ? 'Yes' : 'No');
    s('mileage',msg.mileage  || '--');
    s('voltage',msg.voltage  || '--');
    s('sats',   msg.satellites || '--');
    s('alarms', msg.alarms?.length ? msg.alarms.join(', ') : 'None');
}

// ══════════════════════════════════════════════════════
//  Recordings
// ══════════════════════════════════════════════════════
function setRecStatus(msg) {
    if (!activePhone) return;
    const el = document.getElementById(`${activePhone}-recStatus`);
    if (el) el.textContent = msg;
}

function searchRecordings(phone) {
    const from = document.getElementById(`${phone}-recFrom`).value;
    const to   = document.getElementById(`${phone}-recTo`).value;
    const stat = document.getElementById(`${phone}-recStatus`);
    if (!from || !to) { stat.textContent = '⚠️ Pick both dates'; return; }
    if (ws.readyState !== WebSocket.OPEN) { stat.textContent = '❌ Not connected'; return; }
    stat.textContent = '⏳ Querying device...';
    const fmt = v => v.replace('T', ' ') + ':00';
    ws.send(JSON.stringify({ type: 'query_recordings', phone, startDate: fmt(from), endDate: fmt(to) }));
}

function handleRecordings(list) {
    if (!activePhone) return;
    const dev = devices[activePhone];
    if (!dev) return;
    dev.recs = list || [];
    renderRecordings(activePhone, dev.recs);
    document.getElementById(`${activePhone}-recStatus`).textContent = `✅ ${dev.recs.length} recording(s) found`;
}

function renderRecordings(phone, list) {
    const tbody = document.getElementById(`${phone}-recList`);
    if (!list?.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:#555;padding:10px;">No recordings found</td></tr>';
        return;
    }
    tbody.innerHTML = list.map((r, i) => `
        <tr>
            <td><input type="checkbox" class="rec-check-${phone}" data-idx="${i}"></td>
            <td>CH${r.ch}</td>
            <td>${r.startTime}</td>
            <td>${r.endTime}</td>
            <td>${r.size ? (r.size/1024/1024).toFixed(1)+' MB' : '--'}</td>
            <td><button class="btn-sm" onclick="requestDownload('${phone}',${i})">⬇ Get</button></td>
        </tr>
    `).join('');
}

function toggleAll(phone, cb) {
    document.querySelectorAll(`.rec-check-${phone}`).forEach(c => c.checked = cb.checked);
}

function requestDownload(phone, index) {
    const dev = devices[phone];
    if (!dev) return;
    const rec = dev.recs[index];
    if (!rec) return;
    document.getElementById(`${phone}-recStatus`).textContent = '⏳ Requesting FTP upload...';
    ws.send(JSON.stringify({ type: 'download_recording', ch: rec.ch, startTime: rec.startTime, endTime: rec.endTime, phone: rec.phone }));
}

function downloadSelected(phone) {
    const checked = [...document.querySelectorAll(`.rec-check-${phone}:checked`)];
    if (!checked.length) { document.getElementById(`${phone}-recStatus`).textContent = '⚠️ Select at least one'; return; }
    checked.forEach(cb => requestDownload(phone, parseInt(cb.dataset.idx)));
}

function handleRecordingReady(url) {
    if (!activePhone) return;
    setRecStatus('✅ File ready — playing');
    playFile(activePhone, url);
}

function playFile(phone, url) {
    const section = document.getElementById(`${phone}-playbackSection`);
    section.style.display = 'block';
    section.scrollIntoView({ behavior: 'smooth' });
    const video = document.getElementById(`${phone}-playback`);
    const key   = `_playHls_${phone}`;
    if (window[key]) { window[key].destroy(); window[key] = null; }
    if (url.endsWith('.m3u8') && Hls.isSupported()) {
        const hls = new Hls();
        window[key] = hls;
        hls.loadSource(url); hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        hls.on(Hls.Events.ERROR, (e,d) => console.error('[HLS playback]', d));
    } else {
        video.src = url;
        video.play().catch(console.warn);
    }
}
</script>
</body>
</html>
